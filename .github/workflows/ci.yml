name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rewrite
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d rewrite"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    strategy:
      matrix:
        go-version: ["1.26.x"]
    env:
      SQLC_VERSION: 1.30.0
      GOLANGCI_LINT_VERSION: 2.11.4
      REDOCLY_CLI_VERSION: 2.25.3
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: Install tooling
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v${SQLC_VERSION}
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v${GOLANGCI_LINT_VERSION}
      - name: Verify sqlc generated code is up to date
        run: make sqlc-check
      - name: Validate OpenAPI contract
        run: make openapi-check
      - name: Vet
        run: make vet
      - name: Lint
        run: make lint
      - name: Test
        run: make test
      - name: Integration tests (Postgres)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client
          export DATABASE_URL="postgres://postgres:postgres@127.0.0.1:55432/rewrite?sslmode=disable"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f internal/shared/db/schema.sql
          RUN_INTEGRATION=1 DATABASE_URL="$DATABASE_URL" go test ./internal/integration/... -count=1
        shell: bash
      - name: Build
        run: make build
      - name: Docker image
        run: docker build -t rewrite:ci .

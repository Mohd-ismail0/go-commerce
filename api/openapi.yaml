openapi: 3.0.3
info:
  title: Rewrite Commerce API
  version: 0.2.0
servers:
  - url: http://localhost:8080
components:
  parameters:
    TenantHeader:
      in: header
      name: X-Tenant-ID
      required: true
      schema:
        type: string
    RegionHeader:
      in: header
      name: X-Region-ID
      required: true
      schema:
        type: string
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    Product:
      type: object
      required: [id, tenant_id, region_id, sku, name, currency, price_cents]
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        sku: { type: string }
        name: { type: string }
        currency: { type: string }
        price_cents: { type: integer, format: int64 }
    ProductInput:
      type: object
      required: [sku, name, currency, price_cents]
      properties:
        id: { type: string }
        sku: { type: string }
        name: { type: string }
        currency: { type: string }
        price_cents: { type: integer, format: int64 }
    Order:
      type: object
      required: [id, tenant_id, region_id, customer_id, status, total_cents, currency]
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        customer_id: { type: string }
        status:
          type: string
          enum: [created, confirmed, completed, cancelled]
        total_cents: { type: integer, format: int64 }
        currency: { type: string }
    OrderCreateInput:
      type: object
      required: [customer_id, total_cents, currency]
      properties:
        id: { type: string }
        customer_id: { type: string }
        status:
          type: string
          enum: [created]
        total_cents: { type: integer, format: int64 }
        currency: { type: string }
    OrderStatusUpdate:
      type: object
      required: [id, status]
      properties:
        id: { type: string }
        status:
          type: string
          enum: [created, confirmed, completed, cancelled]
    Customer:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        email: { type: string }
        name: { type: string }
    PriceBookEntry:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        product_id: { type: string }
        currency: { type: string }
        amount_cents: { type: integer, format: int64 }
    StockItem:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        product_id: { type: string }
        quantity: { type: integer, format: int64 }
paths:
  /products:
    get:
      summary: List products
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
        - in: query
          name: sku
          schema:
            type: string
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
        "400":
          description: Invalid tenant/region
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create or update product
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
  /orders:
    get:
      summary: List orders
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      summary: Create order
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreateInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    patch:
      summary: Update order status
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Order updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid status transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /customers:
    get:
      summary: List customers
      responses:
        "200":
          description: Customer list
    post:
      summary: Create or update customer
      responses:
        "201":
          description: Customer saved
  /pricing:
    get:
      summary: List pricing entries
      responses:
        "200":
          description: Price entries
    post:
      summary: Create or update pricing entry
      responses:
        "201":
          description: Pricing entry saved
  /inventory:
    get:
      summary: List inventory
      responses:
        "200":
          description: Inventory list
    post:
      summary: Create or update inventory item
      responses:
        "201":
          description: Inventory item saved
  /promotions:
    get:
      summary: List promotions
      responses:
        "200":
          description: Promotions list
    post:
      summary: Create or update promotion
      responses:
        "201":
          description: Promotion saved
  /regions:
    get:
      summary: List regions
      responses:
        "200":
          description: Regions list
    post:
      summary: Create or update region
      responses:
        "201":
          description: Region saved
  /brands:
    get:
      summary: List brands
      responses:
        "200":
          description: Brand list
    post:
      summary: Create or update brand
      responses:
        "201":
          description: Brand saved

openapi: 3.0.3
info:
  title: Rewrite Commerce API
  version: 0.4.0
  license:
    name: Proprietary
    url: https://example.com/license
servers:
  - url: https://api.rewrite.local
security:
  - ApiTokenAuth: []
components:
  securitySchemes:
    ApiTokenAuth:
      type: http
      scheme: bearer
      bearerFormat: API token
      description: Static API token from API_AUTH_TOKEN environment variable.
    RoleHeaderAuth:
      type: apiKey
      in: header
      name: X-Role
      description: Role header baseline for sensitive routes.
    UserHeaderAuth:
      type: apiKey
      in: header
      name: X-User-JWT
      description: Signed user JWT (HS256) used for identity and role/permission checks.
  parameters:
    TenantHeader:
      in: header
      name: X-Tenant-ID
      required: true
      schema:
        type: string
    RegionHeader:
      in: header
      name: X-Region-ID
      required: true
      schema:
        type: string
    IdempotencyHeader:
      in: header
      name: Idempotency-Key
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
    UserIdHeader:
      in: header
      name: X-User-JWT
      required: false
      schema:
        type: string
    RegionIdQuery:
      in: query
      name: region_id
      required: false
      schema:
        type: string
  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    PaginationMeta:
      type: object
      required: [next_cursor]
      properties:
        next_cursor:
          type: string
    ProductListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        pagination:
          $ref: "#/components/schemas/PaginationMeta"
    Product:
      type: object
      required: [id, tenant_id, region_id, sku, name, currency, price_cents]
      properties:
        id:
          type: string
          minLength: 3
        tenant_id:
          type: string
        region_id:
          type: string
        sku:
          type: string
          minLength: 1
          maxLength: 64
        name:
          type: string
          minLength: 1
          maxLength: 256
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        price_cents:
          type: integer
          format: int64
          minimum: 1
    ProductInput:
      type: object
      required: [sku, name, currency, price_cents]
      properties:
        id:
          type: string
        sku:
          type: string
          minLength: 1
          maxLength: 64
        name:
          type: string
          minLength: 1
          maxLength: 256
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        price_cents:
          type: integer
          format: int64
          minimum: 1
    ProductVariant:
      type: object
      required: [id, tenant_id, region_id, product_id, sku, name, currency, price_cents]
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        product_id: { type: string }
        sku: { type: string }
        name: { type: string }
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        price_cents:
          type: integer
          format: int64
          minimum: 1
    ProductVariantInput:
      type: object
      required: [sku, name, currency, price_cents]
      properties:
        id: { type: string }
        sku: { type: string }
        name: { type: string }
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        price_cents:
          type: integer
          format: int64
          minimum: 1
    Category:
      type: object
      required: [id, tenant_id, region_id, name, slug]
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        name: { type: string }
        slug: { type: string }
        parent_id: { type: string }
    CategoryInput:
      type: object
      required: [name, slug]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        parent_id: { type: string }
    Collection:
      type: object
      required: [id, tenant_id, region_id, name, slug]
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        name: { type: string }
        slug: { type: string }
    CollectionInput:
      type: object
      required: [name, slug]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
    ProductMedia:
      type: object
      required: [id, tenant_id, region_id, product_id, url, media_type]
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        product_id: { type: string }
        url: { type: string }
        media_type: { type: string }
    ProductMediaInput:
      type: object
      required: [url, media_type]
      properties:
        id: { type: string }
        url: { type: string }
        media_type: { type: string }
    ItemsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: {}
    OrderListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        pagination:
          $ref: "#/components/schemas/PaginationMeta"
    Order:
      type: object
      required: [id, tenant_id, region_id, customer_id, status, total_cents, currency]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        region_id:
          type: string
        customer_id:
          type: string
        status:
          type: string
          enum: [created, confirmed, completed, cancelled]
        total_cents:
          type: integer
          format: int64
          minimum: 1
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        updated_at:
          type: string
          format: date-time
    OrderCreateInput:
      type: object
      required: [customer_id, total_cents, currency]
      properties:
        id:
          type: string
        customer_id:
          type: string
        status:
          type: string
          enum: [created]
        total_cents:
          type: integer
          format: int64
          minimum: 1
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        voucher_code:
          type: string
        promotion_id:
          type: string
        tax_class_id:
          type: string
        country_code:
          type: string
    OrderStatusUpdate:
      type: object
      required: [id, status, expected_updated_at]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [created, confirmed, completed, cancelled]
        expected_updated_at:
          type: string
          format: date-time
    Customer:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        email: { type: string }
        name: { type: string }
    PriceBookEntry:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        product_id: { type: string }
        currency: { type: string }
        amount_cents: { type: integer, format: int64 }
    StockItem:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        product_id: { type: string }
        quantity: { type: integer, format: int64 }
    TaxClass:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        name: { type: string }
    TaxRate:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        tax_class_id: { type: string }
        country_code: { type: string }
        rate_basis_points: { type: integer, format: int64 }
    Voucher:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        code: { type: string }
        discount_type: { type: string }
        value_cents: { type: integer, format: int64 }
        currency: { type: string }
        usage_limit: { type: integer, format: int64, nullable: true }
        used_count: { type: integer, format: int64 }
        starts_at: { type: string, format: date-time }
        ends_at: { type: string, format: date-time }
    PromotionRule:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        promotion_id: { type: string }
        rule_type: { type: string }
        value_cents: { type: integer, format: int64 }
        currency: { type: string }
    PricingCalculationInput:
      type: object
      required: [currency, base_amount_cents]
      properties:
        currency: { type: string }
        base_amount_cents: { type: integer, format: int64 }
        voucher_code: { type: string }
        promotion_id: { type: string }
        tax_class_id: { type: string }
        country_code: { type: string }
    PricingCalculationResult:
      type: object
      properties:
        base_amount_cents: { type: integer, format: int64 }
        discount_cents: { type: integer, format: int64 }
        tax_cents: { type: integer, format: int64 }
        total_cents: { type: integer, format: int64 }
paths:
  /products:
    get:
      operationId: get_products
      summary: List products
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: sku
          schema:
            type: string
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
        "400":
          description: Invalid tenant/region
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: post_products
      summary: Create or update product
      description: Idempotent upsert by product ID; retries with same payload are safe.
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
        - $ref: "#/components/parameters/IdempotencyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /orders:
    get:
      operationId: get_orders
      summary: List orders
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: cursor
          schema:
            type: string
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: post_orders
      summary: Create order
      description: Idempotent create by `Idempotency-Key` per tenant.
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
        - $ref: "#/components/parameters/IdempotencyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreateInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: patch_orders
      summary: Update order status
      description: "Allowed transitions: created->confirmed/cancelled, confirmed->completed/cancelled."
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Order updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid status transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Optimistic concurrency conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /products/{product_id}/variants:
    get:
      operationId: get_products_by_product_id_variants
      summary: List product variants
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
        - in: path
          name: product_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Product variants
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ItemsResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/ProductVariant"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: post_products_by_product_id_variants
      summary: Create product variant
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
        - in: path
          name: product_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductVariantInput"
      responses:
        "201":
          description: Variant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductVariant"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: patch_products_by_product_id_variants
      summary: Update product variant
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
        - in: path
          name: product_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductVariantInput"
      responses:
        "201":
          description: Variant updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductVariant"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /products/{product_id}/media:
    get:
      operationId: get_products_by_product_id_media
      summary: List product media
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
        - in: path
          name: product_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Product media
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ItemsResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/ProductMedia"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: post_products_by_product_id_media
      summary: Create product media
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
        - in: path
          name: product_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductMediaInput"
      responses:
        "201":
          description: Product media created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductMedia"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /categories:
    get:
      operationId: get_categories
      summary: List categories
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ItemsResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Category"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: post_categories
      summary: Create category
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /collections:
    get:
      operationId: get_collections
      summary: List collections
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
      responses:
        "200":
          description: Collection list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ItemsResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Collection"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: post_collections
      summary: Create collection
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectionInput"
      responses:
        "201":
          description: Collection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /collections/{collection_id}/products/{product_id}:
    post:
      operationId: post_collections_by_collection_id_products_by_product_id
      summary: Assign product to collection
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
        - in: path
          name: collection_id
          required: true
          schema: { type: string }
        - in: path
          name: product_id
          required: true
          schema: { type: string }
      responses:
        "201":
          description: Product assigned to collection
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /customers:
    get:
      operationId: get_customers
      summary: List customers
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
      responses:
        "200":
          description: Customer list
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: post_customers
      summary: Create or update customer
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
      responses:
        "201":
          description: Customer saved
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /pricing:
    get:
      operationId: get_pricing
      summary: List pricing entries
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
      responses:
        "200":
          description: Price entries
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: post_pricing
      summary: Create or update pricing entry
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
      responses:
        "201":
          description: Pricing entry saved
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /pricing/tax-classes:
    get:
      operationId: get_pricing_tax_classes
      summary: List tax classes
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
      responses:
        "200":
          description: Tax classes list
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: post_pricing_tax_classes
      summary: Create or update tax class
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
      responses:
        "201":
          description: Tax class saved
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /pricing/tax-rates:
    get:
      operationId: get_pricing_tax_rates
      summary: List tax rates
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
      responses:
        "200":
          description: Tax rates list
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: post_pricing_tax_rates
      summary: Create or update tax rate
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
      responses:
        "201":
          description: Tax rate saved
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /pricing/calculate:
    post:
      operationId: post_pricing_calculate
      summary: Calculate deterministic price with discount and tax
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PricingCalculationInput"
      responses:
        "200":
          description: Calculation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingCalculationResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /inventory:
    get:
      operationId: get_inventory
      summary: List inventory
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
      responses:
        "200":
          description: Inventory list

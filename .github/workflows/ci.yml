name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        go-version: ["1.26.x"]
    env:
      SQLC_VERSION: 1.30.0
      GOLANGCI_LINT_VERSION: 2.11.4
      REDOCLY_CLI_VERSION: 2.25.3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: Install tooling
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v${SQLC_VERSION}
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v${GOLANGCI_LINT_VERSION}
      - name: Verify sqlc generated code is up to date
        run: make sqlc-check
      - name: Validate OpenAPI contract
        run: make openapi-check
      - name: Vet
        run: make vet
      - name: Lint
        run: make lint
      - name: Test
        run: make test
      - name: Integration tests (Postgres)
        run: |
          docker run -d --name pg-ci -p 5432:5432 -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=rewrite postgres:16
          trap 'docker rm -f pg-ci' EXIT
          for i in $(seq 1 30); do
            docker exec pg-ci pg_isready -U postgres -d rewrite && break
            sleep 1
          done
          export DATABASE_URL="postgres://postgres:postgres@localhost:5432/rewrite?sslmode=disable"
          docker exec -i pg-ci psql "postgres://postgres:postgres@localhost:5432/rewrite?sslmode=disable" -v ON_ERROR_STOP=1 < internal/shared/db/schema.sql
          export RUN_INTEGRATION=1
          go test ./internal/integration/... -count=1
        shell: bash
      - name: Build
        run: make build

openapi: 3.0.3
info:
  title: Rewrite Commerce API
  version: 0.4.0
  license:
    name: Proprietary
    url: https://example.com/license
servers:
  - url: https://api.rewrite.local
security:
  - ApiTokenAuth: []
components:
  securitySchemes:
    ApiTokenAuth:
      type: http
      scheme: bearer
      bearerFormat: API token
      description: Static API token from API_AUTH_TOKEN environment variable.
    RoleHeaderAuth:
      type: apiKey
      in: header
      name: X-Role
      description: Role header baseline for sensitive routes.
    UserHeaderAuth:
      type: apiKey
      in: header
      name: X-User-JWT
      description: Signed user JWT (HS256) used for identity and role/permission checks.
  parameters:
    TenantHeader:
      in: header
      name: X-Tenant-ID
      required: true
      schema:
        type: string
    RegionHeader:
      in: header
      name: X-Region-ID
      required: true
      schema:
        type: string
    IdempotencyHeader:
      in: header
      name: Idempotency-Key
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
    UserIdHeader:
      in: header
      name: X-User-JWT
      required: false
      schema:
        type: string
    RegionIdQuery:
      in: query
      name: region_id
      required: false
      schema:
        type: string
  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    PaginationMeta:
      type: object
      required: [next_cursor]
      properties:
        next_cursor:
          type: string
    ProductListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        pagination:
          $ref: "#/components/schemas/PaginationMeta"
    Product:
      type: object
      required: [id, tenant_id, region_id, sku, name, currency, price_cents]
      properties:
        id:
          type: string
          minLength: 3
        tenant_id:
          type: string
        region_id:
          type: string
        sku:
          type: string
          minLength: 1
          maxLength: 64
        name:
          type: string
          minLength: 1
          maxLength: 256
        slug:
          type: string
        description:
          type: string
        seo_title:
          type: string
        seo_description:
          type: string
        metadata:
          type: string
          description: JSON-encoded metadata blob.
        external_reference:
          type: string
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        price_cents:
          type: integer
          format: int64
          minimum: 1
        created_at:
          type: string
          format: date-time
    ProductInput:
      type: object
      required: [sku, name, currency, price_cents]
      properties:
        id:
          type: string
        sku:
          type: string
          minLength: 1
          maxLength: 64
        name:
          type: string
          minLength: 1
          maxLength: 256
        slug:
          type: string
        description:
          type: string
        seo_title:
          type: string
        seo_description:
          type: string
        metadata:
          type: string
          description: JSON-encoded metadata blob.
        external_reference:
          type: string
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        price_cents:
          type: integer
          format: int64
          minimum: 1
    ProductVariant:
      type: object
      required: [id, tenant_id, region_id, product_id, sku, name, currency, price_cents]
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        product_id: { type: string }
        sku: { type: string }
        name: { type: string }
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        price_cents:
          type: integer
          format: int64
          minimum: 1
    ProductVariantInput:
      type: object
      required: [sku, name, currency, price_cents]
      properties:
        id: { type: string }
        sku: { type: string }
        name: { type: string }
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        price_cents:
          type: integer
          format: int64
          minimum: 1
    Category:
      type: object
      required: [id, tenant_id, region_id, name, slug]
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        name: { type: string }
        slug: { type: string }
        parent_id: { type: string }
    CategoryInput:
      type: object
      required: [name, slug]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        parent_id: { type: string }
    Collection:
      type: object
      required: [id, tenant_id, region_id, name, slug]
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        name: { type: string }
        slug: { type: string }
    CollectionInput:
      type: object
      required: [name, slug]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
    ProductMedia:
      type: object
      required: [id, tenant_id, region_id, product_id, url, media_type]
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        product_id: { type: string }
        url: { type: string }
        media_type: { type: string }
    ProductMediaInput:
      type: object
      required: [url, media_type]
      properties:
        id: { type: string }
        url: { type: string }
        media_type: { type: string }
    ItemsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: {}
    OrderListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        pagination:
          $ref: "#/components/schemas/PaginationMeta"
    Order:
      type: object
      required: [id, tenant_id, region_id, customer_id, status, total_cents, currency]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        region_id:
          type: string
        customer_id:
          type: string
        status:
          type: string
          enum: [created, confirmed, completed, cancelled]
        total_cents:
          type: integer
          format: int64
          minimum: 1
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OrderCreateInput:
      type: object
      required: [customer_id, total_cents, currency]
      properties:
        id:
          type: string
        customer_id:
          type: string
        status:
          type: string
          enum: [created]
        total_cents:
          type: integer
          format: int64
          minimum: 1
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        voucher_code:
          type: string
        promotion_id:
          type: string
        tax_class_id:
          type: string
        country_code:
          type: string
    OrderStatusUpdate:
      type: object
      required: [id, status, expected_updated_at]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [created, confirmed, completed, cancelled]
        expected_updated_at:
          type: string
          format: date-time
    CheckoutSession:
      type: object
      required: [id, tenant_id, region_id, customer_id, status, currency, subtotal_cents, shipping_cents, tax_cents, total_cents]
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        customer_id: { type: string }
        channel_id: { type: string }
        shipping_method_id: { type: string }
        shipping_address_country:
          type: string
          pattern: "^[A-Z]{2}$"
        shipping_address_postal_code: { type: string }
        billing_address_country:
          type: string
          pattern: "^[A-Z]{2}$"
        billing_address_postal_code: { type: string }
        status: { type: string }
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        voucher_code: { type: string }
        promotion_id: { type: string }
        tax_class_id: { type: string }
        country_code: { type: string }
        subtotal_cents: { type: integer, format: int64 }
        shipping_cents: { type: integer, format: int64 }
        tax_cents: { type: integer, format: int64 }
        total_cents: { type: integer, format: int64 }
        updated_at:
          type: string
          format: date-time
    CheckoutSessionCreateInput:
      type: object
      required: [customer_id, currency]
      properties:
        id: { type: string }
        customer_id: { type: string }
        channel_id: { type: string }
        shipping_method_id: { type: string }
        shipping_address_country:
          type: string
          pattern: "^[A-Z]{2}$"
        shipping_address_postal_code: { type: string }
        billing_address_country:
          type: string
          pattern: "^[A-Z]{2}$"
        billing_address_postal_code: { type: string }
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        voucher_code: { type: string }
        promotion_id: { type: string }
        tax_class_id: { type: string }
        country_code: { type: string }
    CheckoutSessionContextUpdateInput:
      type: object
      properties:
        voucher_code: { type: string }
        promotion_id: { type: string }
        tax_class_id: { type: string }
        country_code: { type: string }
        channel_id: { type: string }
        shipping_method_id: { type: string }
        shipping_address_country:
          type: string
          pattern: "^[A-Z]{2}$"
        shipping_address_postal_code: { type: string }
        billing_address_country:
          type: string
          pattern: "^[A-Z]{2}$"
        billing_address_postal_code: { type: string }
    CheckoutLine:
      type: object
      required: [id, checkout_id, quantity, unit_price_cents, currency]
      properties:
        id: { type: string }
        checkout_id: { type: string }
        product_id: { type: string }
        variant_id: { type: string }
        quantity: { type: integer, format: int64, minimum: 1 }
        unit_price_cents: { type: integer, format: int64, minimum: 1 }
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
    CheckoutLineInput:
      type: object
      required: [id, quantity, unit_price_cents, currency]
      description: Provide at least one of `product_id` or `variant_id`; when both are provided they must refer to the same catalog variant relationship.
      properties:
        id: { type: string }
        product_id: { type: string }
        variant_id: { type: string }
        quantity: { type: integer, format: int64, minimum: 1 }
        unit_price_cents: { type: integer, format: int64, minimum: 1 }
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
    CheckoutCompleteResult:
      type: object
      required: [order_id]
      properties:
        order_id: { type: string }
    WebhookSubscription:
      type: object
      required: [id, tenant_id, region_id, event_name, endpoint_url, is_active]
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        app_id: { type: string }
        event_name: { type: string }
        endpoint_url: { type: string }
        secret: { type: string }
        is_active: { type: boolean }
        updated_at:
          type: string
          format: date-time
    WebhookSubscriptionInput:
      type: object
      required: [event_name, endpoint_url]
      properties:
        id: { type: string }
        app_id: { type: string }
        event_name: { type: string }
        endpoint_url: { type: string }
        secret: { type: string }
        is_active: { type: boolean }
    WebhookSubscriptionPatchInput:
      type: object
      required: [id]
      properties:
        id: { type: string }
        app_id: { type: string }
        event_name: { type: string }
        endpoint_url: { type: string }
        secret: { type: string }
        is_active: { type: boolean }
    WebhookDelivery:
      type: object
      required: [outbox_id, subscription_id, status, attempts]
      properties:
        outbox_id: { type: string }
        subscription_id: { type: string }
        status: { type: string }
        response_status: { type: integer }
        response_body: { type: string }
        attempts: { type: integer, format: int64 }
        next_retry_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    WebhookOutboxRetryInput:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 1
          description: Human-readable reason for manual replay.
    App:
      type: object
      required: [id, tenant_id, region_id, name, is_active]
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        name: { type: string }
        is_active: { type: boolean }
        auth_token: { type: string }
        updated_at:
          type: string
          format: date-time
    AppInput:
      type: object
      required: [name]
      properties:
        id: { type: string }
        name: { type: string }
        is_active: { type: boolean }
        auth_token: { type: string }
    AppPatchInput:
      type: object
      required: [id]
      properties:
        id: { type: string }
        name: { type: string }
        is_active: { type: boolean }
        auth_token: { type: string }
    Channel:
      type: object
      required: [id, tenant_id, region_id, slug, name, default_currency, default_country, is_active]
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        slug: { type: string }
        name: { type: string }
        default_currency:
          type: string
          pattern: "^[A-Z]{3}$"
        default_country:
          type: string
          pattern: "^[A-Z]{2}$"
        is_active: { type: boolean }
        updated_at:
          type: string
          format: date-time
    ChannelInput:
      type: object
      required: [slug, name, default_currency, default_country]
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        default_currency:
          type: string
          pattern: "^[A-Z]{3}$"
        default_country:
          type: string
          pattern: "^[A-Z]{2}$"
        is_active: { type: boolean }
    ProductChannelListing:
      type: object
      required:
        [id, tenant_id, region_id, product_id, channel_id, is_published, visible_in_listings]
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        product_id: { type: string }
        channel_id: { type: string }
        is_published: { type: boolean }
        visible_in_listings: { type: boolean }
        published_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ProductChannelListingInput:
      type: object
      required: [product_id]
      properties:
        id: { type: string }
        product_id: { type: string }
        is_published: { type: boolean }
        visible_in_listings: { type: boolean }
        published_at:
          type: string
          format: date-time
          nullable: true
    ProductChannelListingPatchInput:
      type: object
      required: [product_id]
      properties:
        product_id: { type: string }
        is_published: { type: boolean }
        visible_in_listings: { type: boolean }
        published_at:
          type: string
          format: date-time
          nullable: true
    VariantChannelListing:
      type: object
      required: [id, tenant_id, region_id, variant_id, channel_id, currency, price_cents, is_published]
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        variant_id: { type: string }
        channel_id: { type: string }
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        price_cents:
          type: integer
          format: int64
          minimum: 1
        is_published: { type: boolean }
        published_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    VariantChannelListingInput:
      type: object
      required: [variant_id, currency, price_cents]
      properties:
        id: { type: string }
        variant_id: { type: string }
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        price_cents:
          type: integer
          format: int64
          minimum: 1
        is_published: { type: boolean }
        published_at:
          type: string
          format: date-time
          nullable: true
    VariantChannelListingPatchInput:
      type: object
      required: [variant_id]
      properties:
        variant_id: { type: string }
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        price_cents:
          type: integer
          format: int64
          minimum: 1
        is_published: { type: boolean }
        published_at:
          type: string
          format: date-time
          nullable: true
    Customer:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        email: { type: string }
        name: { type: string }
    CustomerInput:
      type: object
      required: [email, name]
      properties:
        id: { type: string }
        email:
          type: string
          format: email
        name: { type: string }
    PriceBookEntry:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        product_id: { type: string }
        currency: { type: string }
        amount_cents: { type: integer, format: int64 }
    StockItem:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        product_id: { type: string }
        quantity: { type: integer, format: int64 }
    TaxClass:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        name: { type: string }
    TaxRate:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        tax_class_id: { type: string }
        country_code: { type: string }
        rate_basis_points: { type: integer, format: int64 }
    Voucher:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        code: { type: string }
        discount_type: { type: string }
        value_cents: { type: integer, format: int64 }
        currency: { type: string }
        usage_limit: { type: integer, format: int64, nullable: true }
        used_count: { type: integer, format: int64 }
        starts_at: { type: string, format: date-time }
        ends_at: { type: string, format: date-time }
    PromotionRule:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        region_id: { type: string }
        promotion_id: { type: string }
        rule_type: { type: string }
        value_cents: { type: integer, format: int64 }
        currency: { type: string }
    PricingCalculationInput:
      type: object
      required: [currency, base_amount_cents]
      properties:
        currency: { type: string }
        base_amount_cents: { type: integer, format: int64 }
        voucher_code: { type: string }
        promotion_id: { type: string }
        tax_class_id: { type: string }
        country_code: { type: string }
    PricingCalculationResult:
      type: object
      properties:
        base_amount_cents: { type: integer, format: int64 }
        discount_cents: { type: integer, format: int64 }
        tax_cents: { type: integer, format: int64 }
        total_cents: { type: integer, format: int64 }
paths:
  /products:
    get:
      operationId: get_products
      summary: List products
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: sku
          schema:
            type: string
        - in: query
          name: language_code
          description: Optional locale/language code used to overlay translated product fields.
          schema:
            type: string
        - in: query
          name: channel_id
          description: Optional channel filter (uses product channel listings).
          schema:
            type: string
        - in: query
          name: published_only
          description: When true with channel_id, only published channel listings are returned.
          schema:
            type: boolean
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
        "400":
          description: Invalid tenant/region
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: post_products
      summary: Create or update product
      description: Idempotent upsert by product ID; retries with same payload are safe.
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
        - $ref: "#/components/parameters/IdempotencyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /checkouts/sessions:
    post:
      operationId: post_checkouts_sessions
      summary: Create checkout session
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutSessionCreateInput"
      responses:
        "201":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /checkouts/sessions/{checkout_id}:
    patch:
      operationId: patch_checkouts_sessions_by_checkout_id
      summary: Update checkout pricing context
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
        - in: path
          name: checkout_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutSessionContextUpdateInput"
      responses:
        "200":
          description: Checkout session updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Checkout not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Existing checkout lines incompatible with requested channel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /checkouts/sessions/{checkout_id}/lines:
    put:
      operationId: put_checkouts_sessions_by_checkout_id_lines
      summary: Upsert checkout line
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/RegionHeader"
        - in: path
          name: checkout_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:

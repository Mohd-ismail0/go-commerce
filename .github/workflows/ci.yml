name: ci

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25.x"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Install tooling
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.27.0
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.7
      - name: Verify sqlc generated code is up to date
        run: make sqlc-check
      - name: Validate OpenAPI contract
        run: make openapi-check
      - name: Vet
        run: make vet
      - name: Lint
        run: make lint
      - name: Test
        run: make test
      - name: Integration tests (Postgres)
        run: |
          docker run -d --name pg-ci -p 5432:5432 -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=rewrite postgres:16
          for i in $(seq 1 30); do
            docker exec pg-ci pg_isready -U postgres -d rewrite && break
            sleep 1
          done
          export DATABASE_URL="postgres://postgres:postgres@localhost:5432/rewrite?sslmode=disable"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f internal/shared/db/schema.sql
          for f in internal/shared/db/migrations/*.sql; do
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
          export RUN_INTEGRATION=1
          go test ./internal/integration/... -count=1
        shell: bash
      - name: Build
        run: make build
